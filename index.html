<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PGA 2026 Sweep</title>

<style>
body{
  font-family:Arial,sans-serif;
  margin:8px;
  background:#fff;
  color:#004c99;
}

h1{
  font-size:20px;
  margin:6px 0;
}

#updated{
  font-size:12px;
  margin-bottom:6px;
  color:#336699;
}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
  font-size:12px;
}

th,td{
  padding:4px 3px;
  border-bottom:1px solid #c9d8ee;
  text-align:left;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

th{
  background:#e8f1ff;
  color:#003b7a;
}

.col-pos{width:34px}
.col-score{width:40px;text-align:right}
.col-thru{width:34px;text-align:center}
.col-player{width:120px}
.col-owner{width:88px}

.owned{
  font-weight:bold;
}

.leader{
  animation:flashGold 1.2s infinite;
  font-weight:bold;
}

@keyframes flashGold{
  0%{background:#fff4b0}
  50%{background:#ffd700}
  100%{background:#fff4b0}
}
</style>
</head>

<body>

<h1>PGA Championship Sweep</h1>
<div id="updated">Loading...</div>

<table>
<thead>
<tr>
  <th class="col-pos">Pos</th>
  <th class="col-score">Scr</th>
  <th class="col-thru">Thru</th>
  <th class="col-player">Player</th>
  <th class="col-owner">Owner</th>
</tr>
</thead>

<tbody id="board"></tbody>
</table>

<script>
async function loadBoard(){

  const res = await fetch(
    'matched_leaderboard.json?t=' + Date.now()
  );

  const data = await res.json();

  const owned = data.filter(r => r.owner);

  const bestOwnedScore = owned.length
    ? Math.min(...owned.map(r => Number(r.score_num)))
    : null;

  board.innerHTML = data.map(r => {

    const isOwned = !!r.owner;

    const isLeader =
      isOwned &&
      Number(r.score_num) === bestOwnedScore;

    return `
      <tr class="${
        isLeader ? 'leader' :
        isOwned ? 'owned' : ''
      }">

        <td class="col-pos">
          ${r.position || ''}
        </td>

        <td class="col-score">
          ${r.score || ''}
        </td>

        <td class="col-thru">
          ${r.thru || ''}
        </td>

        <td class="col-player">
          ${r.golfer || ''}
        </td>

        <td class="col-owner">
          ${r.owner || ''}
        </td>

      </tr>
    `;
  }).join('');

  updated.textContent =
    'Updated: ' +
    new Date().toLocaleTimeString();
}

loadBoard();

setInterval(loadBoard, 60000);
</script>

</body>
</html>
