<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sweep Tracker</title>

<style>
body{
  font-family:Arial,sans-serif;
  margin:6px;
  background:#fff;
  color:#004c99;
}

main{
  max-width:520px;
  margin:0 auto;
}

h1{
  font-size:18px;
  margin:2px 0 4px 2px;
}

#updated{
  font-size:10px;
  margin:0 0 4px 2px;
  color:#336699;
}

.page-link{
  display:inline-block;
  margin:0 0 7px 2px;
  font-size:11px;
  color:#004c99;
}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
  font-size:11px;
}

th,td{
  padding:2px 2px;
  border-bottom:1px solid #d7e3f5;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

th{
  background:#eef5ff;
  color:#003b7a;
  text-align:left;
}

.pos{width:28px}
.scr{width:26px;text-align:right}
.thru{width:28px;text-align:center}
.player{width:130px}
.owner{width:110px}
.redraw{width:110px}

.redrawCol{display:none}
table.has-redraw .redrawCol{display:table-cell}
table.has-redraw .owner,
table.has-redraw .player{width:90px}

.owned{
  font-weight:bold;
}

.leader{
  animation:flashGold 3s ease-in-out infinite;
  font-weight:bold;
}

@keyframes flashGold{
  0%{background:#ffffff}
  35%{background:#fff7b3}
  50%{background:#ffd700}
  65%{background:#fff7b3}
  100%{background:#ffffff}
}
</style>
</head>

<body>

<main>

<h1 id="title">Sweep Tracker</h1>

<div id="updated">Loading...</div>

<a class="page-link" href="redraw.html">View redraw by owner</a>

<table id="table">
<thead>
<tr>
  <th class="pos">Pos</th>
  <th class="scr">Scr</th>
  <th class="thru">Thru</th>
  <th class="player">Player</th>
  <th class="redraw redrawCol">Redraw</th>
  <th class="owner">Owner</th>
</tr>
</thead>

<tbody id="board"></tbody>

</table>

</main>

<script>
async function loadBoard(){

  const res = await fetch(
    'matched_leaderboard.json?t=' + Date.now()
  );

  const data = await res.json();
  const players = data.players || [];
  const hasRedraw = !!data.has_redraw;

  if (data.page_title) {
    document.title = data.page_title;
    title.textContent = data.page_title;
  }

  table.classList.toggle('has-redraw', hasRedraw);

  // Once a redraw exists it's the authoritative list, so the leader
  // flash follows it; only the original list matters before that.
  const leaderField = hasRedraw ? 'owner_redraw' : 'owner';

  const owned = players.filter(r => r[leaderField]);

  const bestOwnedScore = owned.length
    ? Math.min(...owned.map(r => Number(r.score_num)))
    : null;

  board.innerHTML = players.map(r => {

    const isOwned = !!r[leaderField];

    const isLeader =
      isOwned &&
      Number(r.score_num) === bestOwnedScore;

    return `
      <tr class="${
        isLeader ? 'leader' :
        isOwned ? 'owned' : ''
      }">

        <td class="pos">${r.position || ''}</td>

        <td class="scr">${r.score || ''}</td>

        <td class="thru">${r.thru || ''}</td>

        <td class="player">${r.golfer || ''}</td>

        <td class="redraw redrawCol">${r.owner_redraw || ''}</td>

        <td class="owner">${r.owner || ''}</td>

      </tr>
    `;
  }).join('');

  updated.textContent =
    'Updated: ' +
    new Date().toLocaleTimeString();
}

loadBoard();

setInterval(loadBoard, 60000);
</script>

</body>
</html>
