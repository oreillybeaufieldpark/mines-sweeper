<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PGA 2026 Sweep</title>

<style>
body{
  font-family:Arial,sans-serif;
  margin:6px;
  background:#fff;
  color:#004c99;
}

main{
  max-width:520px;
  margin:0 auto;
}

h1{
  font-size:18px;
  margin:2px 0 4px 2px;
}

#updated{
  font-size:10px;
  margin:0 0 4px 2px;
  color:#336699;
}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
  font-size:11px;
}

th,td{
  padding:2px 2px;
  border-bottom:1px solid #d7e3f5;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

th{
  background:#eef5ff;
  color:#003b7a;
  text-align:left;
}

.pos{width:28px}
.scr{width:26px;text-align:right}
.thru{width:28px;text-align:center}
.player{width:130px}
.owner{width:110px}

.owned{font-weight:bold}

.leader{
  animation:flashGold 1.1s infinite;
  font-weight:bold;
}

@keyframes flashGold{
  0%{background:#fff7b3}
  50%{background:#ffd700}
  100%{background:#fff7b3}
}
</style>
</head>

<body>
<main>
<h1>PGA Championship Sweep</h1>
<div id="updated">Loading...</div>

<table>
<thead>
<tr>
  <th class="pos">Pos</th>
  <th class="scr">Scr</th>
  <th class="thru">Thru</th>
  <th class="player">Player</th>
  <th class="owner">Owner</th>
</tr>
</thead>
<tbody id="board"></tbody>
</table>
</main>

<script>
async function loadBoard(){
  const res = await fetch('matched_leaderboard.json?t=' + Date.now());
  const data = await res.json();

  const owned = data.filter(r => r.owner);
  const bestOwnedScore = owned.length
    ? Math.min(...owned.map(r => Number(r.score_num)))
    : null;

  board.innerHTML = data.map(r => {
    const isOwned = !!r.owner;
    const isLeader = isOwned && Number(r.score_num) === bestOwnedScore;

    return `
      <tr class="${isLeader ? 'leader' : isOwned ? 'owned' : ''}">
        <td class="pos">${r.position || ''}</td>
        <td class="scr">${r.score || ''}</td>
        <td class="thru">${r.thru || ''}</td>
        <td class="player">${r.golfer || ''}</td>
        <td class="owner">${r.owner || ''}</td>
      </tr>
    `;
  }).join('');

  updated.textContent = 'Updated: ' + new Date().toLocaleTimeString();
}

loadBoard();
setInterval(loadBoard, 60000);
</script>

</body>
</html>
