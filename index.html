<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PGA 2026 Sweep</title>
<style>
body{font-family:Arial,sans-serif;margin:24px;background:#0b1320;color:#f5f7fa}
table{width:100%;border-collapse:collapse;background:#111827}
th,td{padding:10px;border-bottom:1px solid #2d3748;text-align:left}
th{background:#1f2937}
.owned{background:#16311f;font-weight:bold}
.muted{color:#a0aec0}
</style>
</head>
<body>
<h1>PGA Championship Sweep</h1>
<div id="updated" class="muted">Loading...</div>
<table>
<thead><tr><th>Pos</th><th>Score</th><th>Thru</th><th>Player</th><th>Owner</th></tr></thead>
<tbody id="board"></tbody>
</table>
<script>
async function loadBoard(){
  const res = await fetch('matched_leaderboard.json?t=' + Date.now());
  const data = await res.json();
  board.innerHTML = data.map(r => `
    <tr class="${r.owner ? 'owned' : ''}">
      <td>${r.position || ''}</td>
      <td>${r.score || ''}</td>
      <td>${r.thru || ''}</td>
      <td>${r.golfer || ''}</td>
      <td>${r.owner || ''}</td>
    </tr>`).join('');
  updated.textContent = 'Updated: ' + new Date().toLocaleTimeString();
}
loadBoard();
setInterval(loadBoard, 60000);
</script>
</body>
</html>
