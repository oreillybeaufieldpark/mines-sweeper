<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Post-cut Redraw</title>

<style>
body{
  font-family:Arial,sans-serif;
  margin:6px;
  background:#fff;
  color:#004c99;
}

main{
  max-width:620px;
  margin:0 auto;
}

h1{
  font-size:18px;
  margin:2px 0 4px 2px;
}

.intro{
  font-size:11px;
  line-height:1.4;
  margin:0 2px 7px;
  color:#336699;
}

.page-link{
  display:inline-block;
  margin:0 0 9px 2px;
  font-size:11px;
  color:#004c99;
}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
  font-size:11px;
}

th,td{
  padding:3px 4px;
  border-bottom:1px solid #d7e3f5;
  text-align:left;
}

th{
  background:#eef5ff;
  color:#003b7a;
}

.owner{width:34%}
.player{width:50%}
.position{width:16%;text-align:center}

.owner-start td{
  border-top:2px solid #9cbce5;
}

.owner-name{
  font-weight:bold;
}

#error{
  display:none;
  margin:8px 2px;
  color:#a00000;
  font-size:12px;
}
</style>
</head>

<body>
<main>
<h1>Post-cut Redraw</h1>
<p class="intro">The saved redraw, grouped by owner. Positions come from the leaderboard and the draw itself is not rerun.</p>
<a class="page-link" href="index.html">Back to live leaderboard</a>

<table id="table">
<thead>
<tr>
  <th class="owner">Owner</th>
  <th class="player">Player</th>
  <th class="position">Position</th>
</tr>
</thead>
<tbody id="draw"></tbody>
</table>

<p id="error">The redraw details could not be loaded. Please try again shortly.</p>
</main>

<script>
function escapeHtml(value){
  return String(value || '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

async function loadDraw(){
  try{
    const res = await fetch('matched_leaderboard.json?t=' + Date.now());
    if(!res.ok) throw new Error('Leaderboard request failed');

    const data = await res.json();
    const rows = (data.players || [])
      .filter(player => player.owner_redraw)
      .sort((a, b) =>
        a.owner_redraw.localeCompare(b.owner_redraw) ||
        Number(a.score_num) - Number(b.score_num) ||
        Number(a.order) - Number(b.order)
      );

    let previousOwner = '';
    draw.innerHTML = rows.map(player => {
      const firstForOwner = player.owner_redraw !== previousOwner;
      previousOwner = player.owner_redraw;

      return `
        <tr class="${firstForOwner ? 'owner-start' : ''}">
          <td class="owner owner-name">${escapeHtml(player.owner_redraw)}</td>
          <td class="player">${escapeHtml(player.golfer)}</td>
          <td class="position">${escapeHtml(player.position)}</td>
        </tr>
      `;
    }).join('');

    if(!rows.length) throw new Error('No saved redraw found');
  }catch(err){
    table.style.display = 'none';
    error.style.display = 'block';
  }
}

loadDraw();
</script>
</body>
</html>
