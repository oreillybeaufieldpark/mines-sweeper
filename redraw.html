<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Post-cut Redraw</title>

<style>
body{
  font-family:Arial,sans-serif;
  margin:6px;
  background:#fff;
  color:#004c99;
}

main{
  max-width:620px;
  margin:0 auto;
}

h1{
  font-size:18px;
  margin:2px 0 4px 2px;
}

.intro{
  font-size:11px;
  line-height:1.4;
  margin:0 2px 7px;
  color:#336699;
}

.page-link{
  display:inline-block;
  margin:0 0 9px 2px;
  font-size:11px;
  color:#004c99;
}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
  font-size:11px;
}

th,td{
  padding:3px 4px;
  border-bottom:1px solid #d7e3f5;
  text-align:left;
}

th{
  background:#eef5ff;
  color:#003b7a;
}

.sort-button{
  width:100%;
  min-height:32px;
  padding:4px 2px;
  border:0;
  background:transparent;
  color:inherit;
  font:inherit;
  font-weight:bold;
  text-align:left;
  cursor:pointer;
  touch-action:manipulation;
}

.position .sort-button{
  text-align:center;
}

.sort-button:hover,
.sort-button:focus-visible{
  text-decoration:underline;
}

.owner{width:32%}
.player{width:44%}
.position{width:24%;text-align:center}

.owner-start td{
  border-top:2px solid #9cbce5;
}

.owner-name{
  font-weight:bold;
}

#error{
  display:none;
  margin:8px 2px;
  color:#a00000;
  font-size:12px;
}
</style>
</head>

<body>
<main>
<h1>Post-cut Redraw</h1>
<p class="intro">The saved redraw, grouped by owner. Positions are fixed at the post-cut standings used for the draw.</p>
<a class="page-link" href="index.html">Back to live leaderboard</a>

<table id="table">
<thead>
<tr>
  <th id="owner-heading" class="owner" aria-sort="ascending">
    <button id="sort-owner" class="sort-button" type="button">Owner ▲</button>
  </th>
  <th class="player">Player</th>
  <th id="position-heading" class="position" aria-sort="none">
    <button id="sort-position" class="sort-button" type="button">ESPN Position</button>
  </th>
</tr>
</thead>
<tbody id="draw"></tbody>
</table>

<p id="error">The redraw details could not be loaded. Please try again shortly.</p>
</main>

<script>
let redrawRows = [];
let sortKey = 'owner';
let sortDirection = 1;

function escapeHtml(value){
  return String(value || '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function positionNumber(value){
  const match = String(value || '').match(/\d+/);
  return match ? Number(match[0]) : Number.MAX_SAFE_INTEGER;
}

function renderDraw(){
  const rows = [...redrawRows].sort((a, b) => {
    if(sortKey === 'position'){
      return (positionNumber(a.cut_position) - positionNumber(b.cut_position)) * sortDirection ||
        Number(a.cut_order) - Number(b.cut_order);
    }

    return a.owner_redraw.localeCompare(b.owner_redraw) * sortDirection ||
      Number(a.score_num) - Number(b.score_num) ||
      Number(a.order) - Number(b.order);
  });

  let previousOwner = '';
  document.getElementById('draw').innerHTML = rows.map(player => {
    const firstForOwner = sortKey === 'owner' && player.owner_redraw !== previousOwner;
    previousOwner = player.owner_redraw;

    return `
      <tr class="${firstForOwner ? 'owner-start' : ''}">
        <td class="owner owner-name">${escapeHtml(player.owner_redraw)}</td>
        <td class="player">${escapeHtml(player.golfer)}</td>
        <td class="position">${escapeHtml(player.cut_position)}</td>
      </tr>
    `;
  }).join('');

  const arrow = sortDirection === 1 ? '▲' : '▼';
  const ownerHeading = document.getElementById('owner-heading');
  const positionHeading = document.getElementById('position-heading');
  ownerHeading.setAttribute('aria-sort', sortKey === 'owner' ? (sortDirection === 1 ? 'ascending' : 'descending') : 'none');
  positionHeading.setAttribute('aria-sort', sortKey === 'position' ? (sortDirection === 1 ? 'ascending' : 'descending') : 'none');
  document.getElementById('sort-owner').textContent = `Owner ${sortKey === 'owner' ? arrow : ''}`.trim();
  document.getElementById('sort-position').textContent = `ESPN Position ${sortKey === 'position' ? arrow : ''}`.trim();
}

function changeSort(nextKey){
    sortDirection = sortKey === nextKey ? sortDirection * -1 : 1;
    sortKey = nextKey;
    renderDraw();
}

document.getElementById('sort-owner').addEventListener('click', () => changeSort('owner'));
document.getElementById('sort-position').addEventListener('click', () => changeSort('position'));

async function loadDraw(){
  try{
    const [leaderboardRes, cutPositionsRes] = await Promise.all([
      fetch('matched_leaderboard.json?t=' + Date.now()),
      fetch('redraw_cut_positions.json')
    ]);
    if(!leaderboardRes.ok || !cutPositionsRes.ok) throw new Error('Redraw request failed');

    const data = await leaderboardRes.json();
    const cutData = await cutPositionsRes.json();
    redrawRows = (data.players || [])
      .filter(player => player.owner_redraw)
      .map(player => ({
        ...player,
        cut_position: cutData.positions[player.golfer] || '',
        cut_order: cutData.orders[player.golfer]
      }));
    if(!redrawRows.length) throw new Error('No saved redraw found');
    renderDraw();
  }catch(err){
    table.style.display = 'none';
    error.style.display = 'block';
  }
}

loadDraw();
</script>
</body>
</html>
